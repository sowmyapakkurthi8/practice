<!DOCTYPE html>
<html>
	<head>
		<title>FORMS INTRODUCTION</title>
	</head>
	<body>
		<form>
			<table border="1" cellpadding="8">
			<tr>
				<td>NAME:</td>
				<td><input type="text" name="name"></td>
			</tr>
			<tr>
				<td>PASSWORD:</td>
				<td><input type="password" name="password"></td>
			</tr>
			<tr>
				<td>TIME:</td>
				<td><input type="time" name="time"></td>
			</tr>
			<tr>
				<td>DATE:</td>
				<td><input type="date" name="date"></td>
			</tr>
			<tr>
				<td>GENDER:</td>
				<td>
					<input type="radio" name="gender">MALE
					<input type="radio" name="gender">FEMALE
				</td>
			</tr>
			<tr>
				<td>HOBBIES:</td>
				<td>
					<input type="checkbox" name="hobbies">READING<br>
					<input type="checkbox" name="hobbies">WRITING<br>
					<input type="checkbox" name="hobbies">PLAYING<br>
					<input type="checkbox" name="hobbies">SINGING<br>
					<input type="checkbox" name="hobbies">DANCING<br>
				</td>
			</tr>
			<tr>
				<td>ADDRESS:</td>
				<td><textarea rows="5" cols="10" ></textarea></td>
			</tr>
			<tr>
				<td>MARKSLIST:</td>
				<td><input type="file" name="markslist"></td>
			</tr>
			<tr>
				<td colspan="2" align="center">
				<input type="reset" value="Reset">
				<input type="submit" value="Submit">
			</td>
			</tr>
		</form>
	</body>
</html>
